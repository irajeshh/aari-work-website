<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lotus Aari Work</title>
    <style>
        :root {
            --purple: #6B07AF;
            --purple-dark: #4b007f;
            --white: #ffffff;
            --text: #222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: #fff;
            padding: 100px 100px 0 100px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header-top {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 16px 20px;
        }

        .top-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand img {
            width: 96px;
            height: auto;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .brand-text .name {
            font-family: 'Lucida Calligraphy', 'Brush Script MT', cursive;
            font-size: clamp(2rem, 5vw, 3.4rem);
            color: var(--purple);
            font-weight: 800;
            margin: 0;
        }

        .brand-text .subtitle {
            font-size: clamp(1.2rem, 2.7vw, 2rem);
            color: #3e0f97;
            font-weight: 800;
            margin: 0;
            margin-top: -6px;
        }

        .contact {
            display: flex;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .contact a {
            color: var(--purple-dark);
            text-decoration: none;
        }

        .navbar {
            background: var(--purple);
            padding: 12px 0;
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .nav-inner a {
            color: #fff;
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 700;
            padding: 10px 10px;
            border-radius: 6px;
        }

        .nav-inner a:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .btn-login {
            background: #6B07AF;
            color: var(--purple);
            padding: 10px 20px;
            border-radius: 24px;
            border: 2px solid #fff;
        }

        .btn-login:hover {
            background: #f7f1ff;
        }

        .main {
            padding: 26px 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .gallery img {
            width: 100%;
            height: 550px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .gallery img:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
        }

        @media (max-width: 860px) {
            .contact {
                justify-content: center;
                width: 100%;
            }

            .nav-inner {
                gap: 18px;
            }
        }

        @media (max-width: 560px) {
            .nav-inner {
                gap: 10px;
            }

            .nav-inner a {
                font-size: 1rem;
                padding: 8px 8px;
            }
        }
    </style>
</head>

<body>
    <header>
        <section class="header-top">
            <div class="container top-inner">
                <img src="images/logo.png" alt="Lotus logo" height="150" width="250" />
                <div class="contact">
                    <a href="tel:+919876543210">📞 9876543210</a>
                    <a href="mailto:peerfathima32@gmail.com">✉️ peerfathima32@gmail.com</a>
                </div>
            </div>
        </section>

        <nav class="navbar" aria-label="Primary">
            <div class="container nav-inner">
                <a href="index.html">Home</a>
                <a href="our-work.html">Our Work</a>
                <a href="our-student-work.html">Our Student Work</a>
                <a href="contact.html">Contact Us</a>
                <a href="about.html">About</a>
                <a href="course-details.html">Course Details</a>
                <a href="login.html" class="btn-login">Login /Register</a>
            </div>
        </nav>
    </header>

    <main class="main">
        <h2>Our Aari Gallery</h2>
        <div class="gallery">
            <img src="images/aari1.jpg" alt="Aari design 1" />
            <img src="images/aari2.jpg" alt="Aari design 2" />
            <img src="images/aari3.jpg" alt="Aari design 3" />
            <img src="images/aari4.jpg" alt="Aari design 4" />
            <img src="images/aari5.jpg" alt="Aari design 5" />
        </div>
    </main>

</body>

</html>
