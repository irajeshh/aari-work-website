<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Work - Lotus Aari Work</title>
    <style>
        :root {
            --purple: #6B07AF;
            --purple-dark: #4b007f;
            --bg: #fef0e0;
            --text: #1f163f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #121212;
            background: #fff;
        }

        .navbar {
            background: var(--purple);
            padding: 12px 0;
        }

        .nav-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .nav-inner a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 8px 12px;
        }

        .header-section {
            background: var(--bg);
            text-align: center;
            padding: 64px 16px;
            border-bottom: 1px solid #f2d6bb;
        }

        .header-section h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            color: var(--purple);
            margin-bottom: 16px;
        }

        .header-section p {
            font-size: 1.8rem;
            color: #1d1a37;
            max-width: 940px;
            margin: 0 auto;
            font-weight: bold;
        }

        .content {
            max-width: 1200px;
            margin: 36px auto;
            padding: 0 16px;
        }

        .ourwork-gallery {
            margin-top: 30px;
        }

        .ourwork-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .ourwork-grid img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 16px;
            border: 3px solid var(--purple);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
        }

        .footer-placeholder {
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html">Home</a>
            <a href="our-work.html">Our Work</a>
            <a href="our-student-work.html">Our Student Work</a>
            <a href="contact.html">Contact Us</a>
            <a href="about.html">About</a>
            <a href="course-details.html">Course Details</a>
            <a href="login.html" style="background:#fff;color:var(--purple);border-radius:24px;padding:8px 18px;">Login
                /Register</a>
        </div>
    </nav>

    <header class="header-section">
        <h1>Our Work</h1>
    </header>

    <main class="content">
        <p style="font-size:1.8rem; color:#1d1a37; max-width:940px; margin:0 auto 24px; text-align:center;">
            Discover One of The Best Collection of Latest Designer Blouses.</p>

        <section class="ourwork-gallery">
            <div class="ourwork-grid">
                <img src="images/ourwork/aari1.jpeg" alt="Aari design 1" />
                <img src="images/ourwork/aari2.jpeg" alt="Aari design 2" />
                <img src="images/ourwork/aari3.jpeg" alt="Aari design 3" />
                <img src="images/ourwork/aari4.jpeg" alt="Aari design 4" />
                <img src="images/ourwork/aari5.jpeg" alt="Aari design 5" />
                <img src="images/ourwork/aari6.jpeg" alt="Aari design 6" />
            </div>
        </section>
    </main>

    <div class="footer-placeholder"></div>
    <script>
        (async () => {
            try {
                const res = await fetch('footer.html');
                if (!res.ok) throw new Error('Footer not found');
                document.querySelector('.footer-placeholder').innerHTML = await res.text();
            } catch (error) { console.error(error); }
        })();
    </script>
</body>

</html>
