<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Lotus Aari Work</title>
    <style>
        :root {
            --purple: #6B07AF;
            --purple-dark: #4b007f;
            --bg: #fff;
            --text: #1f163f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: #fff;
            padding: 100px 100px 0 100px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .sub-header {
            text-align: center;
            margin: 32px 0 24px;
        }

        .sub-header h2 {
            font-size: clamp(2.2rem, 6vw, 3.6rem);
            color: var(--purple);
            margin-bottom: 12px;
        }

        .sub-header p {
            max-width: 780px;
            margin: 0 auto;
            font-size: 1.2rem;
            color: #333;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .contact-card {
            background: #fff;
            border: 2px solid #f0e4ff;
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.06);
            margin-bottom: 48px;
        }

        .contact-card h3 {
            font-size: 2rem;
            color: #1f163f;
            margin-bottom: 10px;
        }

        .contact-card .icon {
            font-size: 2.5rem;
            margin: 12px 0;
            display: inline-block;
        }

        .contact-card p {
            margin: 12px 0 0;
            font-size: 1.5rem;
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 26px;
            margin-top: 24px;
            align-items: start;
        }

        .contact-form-card,
        .contact-image-card {
            background: #fff;
            border: 2px solid #f0e4ff;
            border-radius: 16px;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.06);
            padding: 24px;
        }

        .contact-form-card h3 {
            font-size: 2rem;
            color: #1f163f;
            margin-bottom: 18px;
        }

        .contact-form-card form {
            display: grid;
            gap: 12px;
        }

        .contact-form-card label {
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            display: inline-block;
        }

        .contact-form-card input,
        .contact-form-card textarea {
            width: 100%;
            border: 2px solid var(--purple);
            border-radius: 14px;
            padding: 12px;
            font-size: 1.05rem;
            outline: none;
            transition: border-color .2s ease;
        }

        .contact-form-card input:focus,
        .contact-form-card textarea:focus {
            border-color: var(--purple-dark);
        }

        .contact-form-card textarea {
            height: 160px;
            resize: vertical;
        }

        .contact-form-card button {
            margin-top: 10px;
            border: none;
            background: var(--purple);
            color: #fff;
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .contact-form-card button:hover {
            background: var(--purple-dark);
        }

        .contact-image-card img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            display: block;
        }

        @media (max-width: 900px) {
            body {
                padding: 60px 30px 0 30px;
            }

            .contact-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .contact-card {
                padding: 20px;
            }

            .contact-row {
                gap: 18px;
            }

            .contact-form-card,
            .contact-image-card {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="content">
        <section class="sub-header">
            <h2>Contact Us</h2>
            <p>Reach out to Lotus Aari Work for questions, course registrations, or custom design inquiries. We're here
                to help you begin your Aari embroidery journey with confidence.</p>
        </section>

        <section class="contact-grid">
            <article class="contact-card">
                <h3>Email Us</h3>
                <div class="icon">✉️</div>
                <p>lotusaariwork@gmail.com</p>
            </article>
            <article class="contact-card">
                <h3>Phone Number</h3>
                <div class="icon">📞</div>
                <p>9562486513</p>
            </article>
        </section>

        <section class="contact-row">
            <div class="contact-form-card">
                <h3>Contact Form</h3>
                <form>
                    <label>Name</label>
                    <input type="text" placeholder="Enter your Name" />
                    <label>Mobile Number</label>
                    <input type="text" placeholder="Enter your Mobile Number" />
                    <label>Email</label>
                    <input type="email" placeholder="Enter your Email" />
                    <label>Message</label>
                    <textarea placeholder="Send Message"></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
            <div class="contact-image-card">
                <img src="images/contact.avif" alt="Contact illustration" />
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script>
        (async () => {
            try {
                const navbarResponse = await fetch('navBar.html');
                if (navbarResponse.ok) {
                    document.getElementById('navbar-placeholder').innerHTML = await navbarResponse.text();
                }
                const footerResponse = await fetch('footer.html');
                if (footerResponse.ok) {
                    document.getElementById('footer-placeholder').innerHTML = await footerResponse.text();
                }
            } catch (error) {
                console.error(error);
            }
        })();
    </script>
</body>

</html>
